name: Electron installers

# Builds desktop installers for Windows and Linux from the unmodified web build.
# (macOS is omitted: unsigned .dmg builds won't run on other machines without the
# signing/notarization setup.) Runs on version tags and is manually dispatchable.
# On a tag push, the built installers are attached to an automatically-drafted
# GitHub Release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: --linux AppImage
          - os: windows-latest
            args: --win nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Produce the static web bundle the shell wraps (core + app-web).
      - name: Build web app
        run: pnpm build

      # Single source of truth for the version is the root package.json.
      - name: Resolve version
        id: ver
        shell: bash
        run: echo "v=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build installer
        working-directory: packages/app-shell-electron
        shell: bash
        run: pnpm exec electron-builder ${{ matrix.args }} --publish never --config.extraMetadata.version=${{ steps.ver.outputs.v }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.os }}
          path: |
            packages/app-shell-electron/dist/*.AppImage
            packages/app-shell-electron/dist/*.exe
          if-no-files-found: ignore

  release:
    # Only draft a release for tag pushes, once both installers are built.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: installers-*
          merge-multiple: true

      - name: Draft release with installers
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
